<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="pi.css" />
</head>
<body>
  <div class="field">
    <label for="scope">Scope</label>
    <select id="scope" data-setting="scope">
      <option value="block">Active 5h block</option>
      <option value="today">Today</option>
      <option value="week">Last 7 days</option>
      <option value="month">Month to date</option>
    </select>
  </div>
  <div class="field">
    <label for="metric">Metric</label>
    <select id="metric" data-setting="metric">
      <option value="cost">Cost (USD)</option>
      <option value="tokens">Tokens</option>
    </select>
  </div>
  <div class="field">
    <label for="refresh">Refresh every (seconds, 10–300)</label>
    <input id="refresh" type="number" min="10" max="300" step="5" placeholder="30" data-setting="refreshSeconds" />
    <div class="hint">All usage tiles share one ccusage poll; the fastest visible tile sets the pace. Press the key to refresh immediately.</div>
  </div>
  <script src="pi.js"></script>
</body>
</html>
